<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bandmate | Passwort zurücksetzen</title>

    <meta name="description" content="Setze dein Bandmate-Passwort sicher zurück und erhalte wieder Zugriff auf deine Proben, Auftritte und Bands.">
    <meta name="theme-color" content="#0B1220">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        (function () {
            const STORAGE_KEY = 'theme';
            let resolvedTheme = 'light';
            try {
                const storedTheme = localStorage.getItem(STORAGE_KEY);
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    resolvedTheme = storedTheme;
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    resolvedTheme = 'dark';
                }
            } catch (error) { }
            document.documentElement.dataset.theme = resolvedTheme;
            document.documentElement.classList.toggle('theme-dark', resolvedTheme === 'dark');
        })();
    </script>

    <link rel="stylesheet" href="css/style.css">
    
    <!-- Supabase JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="landing-active">
    <div id="toast" class="toast"></div>

    <main id="landingPage" class="landing-page active">
        <div class="landing-content">
            <header class="landing-header" style="padding: 1rem 2rem;">
                <div class="landing-logo">
                    <img src="images/branding/bandmate-logo-short.svg" alt="Bandmate" class="logo-light" style="height: 32px !important;">
                    <img src="images/branding/bandmate-logo-short-dark.svg" alt="Bandmate" class="logo-dark" style="height: 32px !important;">
                </div>
            </header>

            <section class="landing-hero" style="min-height: calc(100vh - 80px); display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;">
                <div class="reset-card-wrapper" style="width: 100%; max-width: 440px; margin: 0 auto; background: var(--color-surface); border-radius: 20px; border: 1px solid var(--color-border); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); overflow: hidden;">
                    <!-- Top Accent Bar -->
                    <div style="height: 4px; background: #8b5cf6;"></div>
                    
                    <div style="padding: 2.5rem 2rem;">
                        <div class="auth-form-header" style="text-align: center; margin-bottom: 2rem;">
                            <h3 style="font-size: 1.5rem; color: var(--color-text); margin-bottom: 0.75rem; font-weight: 700;">Passwort zurücksetzen</h3>
                            <p style="color: var(--color-text-secondary); font-size: 0.9rem; line-height: 1.5;">Vergib jetzt dein neues Passwort für deinen Bandmate-Account.</p>
                        </div>

                        <form id="resetPasswordForm" class="auth-form active">
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--color-text-secondary);">Neues Passwort</label>
                                <input type="password" id="newPassword" placeholder="••••••••" required minlength="6"
                                    style="width: 100%; padding: 0.85rem 1rem; border-radius: 10px; border: 1px solid var(--color-border); background: var(--color-bg-secondary); color: var(--color-text); font-size: 1rem;">
                            </div>
                            <div class="form-group" style="margin-bottom: 2rem;">
                                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--color-text-secondary);">Passwort bestätigen</label>
                                <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6"
                                    style="width: 100%; padding: 0.85rem 1rem; border-radius: 10px; border: 1px solid var(--color-border); background: var(--color-bg-secondary); color: var(--color-text); font-size: 1rem;">
                            </div>
                            
                            <button type="submit" class="btn-submit" id="resetBtn" 
                                style="width: 100%; height: 52px; background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);">
                                Passwort speichern
                            </button>

                            <div style="margin-top: 2rem; border-top: 1px solid var(--color-border); padding-top: 1.5rem; text-align: center;">
                                <a href="index.html" class="auth-inline-link strong" style="color: var(--color-text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 600;">
                                    Zurück zum Login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Essential Scripts -->
    <script src="js/logger.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Initialize basics
            SupabaseClient.init();
            
            const form = document.getElementById('resetPasswordForm');
            const resetBtn = document.getElementById('resetBtn');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            const validatePasswords = () => {
                const pass = newPasswordInput.value;
                const conf = confirmPasswordInput.value;

                if (pass.length > 0 && pass.length < 6) {
                    newPasswordInput.setCustomValidity('Das Passwort muss mindestens 6 Zeichen lang sein.');
                } else {
                    newPasswordInput.setCustomValidity('');
                }

                if (conf.length > 0 && pass !== conf) {
                    confirmPasswordInput.setCustomValidity('Die Passwörter stimmen nicht überein.');
                } else {
                    confirmPasswordInput.setCustomValidity('');
                }
            };

            newPasswordInput.addEventListener('input', validatePasswords);
            confirmPasswordInput.addEventListener('input', validatePasswords);

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (newPassword !== confirmPassword) {
                    UI.showToast('Die Passwörter stimmen nicht überein.', 'error');
                    return;
                }

                if (newPassword.length < 6) {
                    UI.showToast('Das Passwort muss mindestens 6 Zeichen lang sein.', 'error');
                    return;
                }

                resetBtn.disabled = true;
                const originalText = resetBtn.textContent;
                resetBtn.textContent = 'Speichere...';

                try {
                    const sb = SupabaseClient.getClient();
                    if (!sb) throw new Error('Verbindung zu Supabase fehlgeschlagen.');

                    // Update the password
                    const { error } = await sb.auth.updateUser({ password: newPassword });
                    if (error) throw error;

                    // IMPORTANT: Force Logout after reset as requested
                    await sb.auth.signOut();

                    UI.showToast('Passwort erfolgreich geändert! Bitte logge dich mit deinem neuen Passwort ein.', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);

                } catch (err) {
                    console.error('Reset error:', err);
                    UI.showToast('Fehler: ' + (err.message || 'Passwort konnte nicht geändert werden.'), 'error');
                    resetBtn.disabled = false;
                    resetBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>

</html>
